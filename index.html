<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Hebrew OCR</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #111;
  color: #eee;
  padding: 20px;
}

#dropZone {
  border: 2px dashed #555;
  padding: 30px;
  text-align: center;
  margin-bottom: 20px;
  cursor: pointer;
}

#dropZone input {
  display: none;
}

.preview {
  max-width: 120px;
  margin: 5px;
}

#previewContainer {
  display: flex;
  flex-wrap: wrap;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 20px;
  background: #222;
  color: #fff;
}

button {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🧾 OCR עברית</h2>

<label id="dropZone">
  לחץ לבחירת תמונות
  <input type="file" id="fileInput" multiple accept="image/*">
</label>

<div id="previewContainer"></div>

<button onclick="startOCR()">חלץ טקסט</button>
<button onclick="downloadText()">⬇️ הורד טקסט</button>

<textarea id="output"></textarea>

<script>
let files = [];

const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const output = document.getElementById('output');

fileInput.onchange = () => handleFiles(fileInput.files);

function handleFiles(selectedFiles) {
  files = Array.from(selectedFiles);
  previewContainer.innerHTML = "";

  files.forEach(file => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    img.className = 'preview';
    previewContainer.appendChild(img);
  });
}

function preprocessImage(img) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const gray = (data[i] + data[i+1] + data[i+2]) / 3;
    const value = gray > 140 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

async function startOCR() {
  output.value = "";

  for (let i = 0; i < files.length; i++) {
    const file = files[i];

    const img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(resolve => { img.onload = resolve; });

    const processed = preprocessImage(img);

    const { data } = await Tesseract.recognize(
      processed,
      'heb+eng'
    );

    output.value += `--- תמונה ${i+1} ---\n`;
    output.value += data.text + "\n\n";
  }
}

function downloadText() {
  const blob = new Blob([output.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ocr.txt';
  a.click();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
